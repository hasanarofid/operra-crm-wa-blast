version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: operra-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www

  node-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: operra-node
    restart: unless-stopped
    ports:
      - "53002:3000"
    volumes:
      - ./node-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis

  webserver:
    image: nginx:alpine
    container_name: operra-nginx
    restart: unless-stopped
    ports:
      - "58181:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - node-service

  db:
    image: mysql:8.0
    container_name: operra-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_crm_wa_blast}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - .docker/dbdata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: operra-redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: operra-worker
    restart: unless-stopped
    command: php artisan whatsapp:process-webhooks
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db
