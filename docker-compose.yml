version: '3.8'

services:
  # Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: operra-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - operra-network

  # Node.js Service (Webhook & Socket.io)
  node-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: operra-node
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./node-service:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - operra-network
    depends_on:
      - redis

  # Web Server (Nginx)
  webserver:
    image: nginx:alpine
    container_name: operra-nginx
    restart: unless-stopped
    ports:
      - "8180:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - operra-network
    depends_on:
      - app
      - node-service

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: operra-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_crm_wa_blast}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    ports:
      - "3307:3306"
    volumes:
      - .docker/dbdata:/var/lib/mysql
    networks:
      - operra-network

  # Cache & Broker (Redis)
  redis:
    image: redis:7-alpine
    container_name: operra-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - operra-network

  # Laravel Worker (Consumer)
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    container_name: operra-worker
    restart: unless-stopped
    command: php artisan whatsapp:process-webhooks
    volumes:
      - ./:/var/www
    networks:
      - operra-network
    depends_on:
      - redis
      - db

networks:
  operra-network:
    driver: bridge
